<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Ved's Page</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      #hero-404 {
        overflow: hidden;
      }

      .floating-404-layer {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      .floating-404-dots {
        position: absolute;
        inset: 0;
        opacity: 0.07;
        background-image: radial-gradient(#000 1.1px, transparent 1.1px);
        background-size: 7px 7px;
      }

      #floating-404-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      #hero-404 .hero-premium__content {
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div class="floating-404-layer" aria-hidden="true">
      <div class="floating-404-dots"></div>
      <canvas id="floating-404-canvas"></canvas>
    </div>

    <main class="hero-premium" id="hero-404">
      <div class="hero-premium__bg" aria-hidden="true"></div>
      <div class="hero-premium__content">
        <p class="eyebrow">Ved's Page</p>
        <h1 class="hero-premium__title">404</h1>
        <p class="subtitle">
          This page does not exist or may have been moved.
        </p>
        <div class="hero-premium__actions">
          <a class="hero-premium__button" href="/">Back to home</a>
          <a class="hero-premium__button hero-premium__button--ghost" href="/index.html">
            Open index directly
          </a>
        </div>
      </div>
    </main>

    <script type="module" src="/404.js"></script>
  </body>
</html>
